name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto-bump version and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12'

      - name: Check if version was already bumped in this push
        id: check_bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "chore: bump version"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.check_bump.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          # Also update plugin.json
          node -e "
            const fs = require('fs');
            const v = '$VERSION';
            // Update ALL plugin.json files (root + monorepo subdirs)
            for (const pf of ['.claude-plugin/plugin.json', 'claude-code/.claude-plugin/plugin.json']) {
              if (fs.existsSync(pf)) {
                const pd = JSON.parse(fs.readFileSync(pf, 'utf-8'));
                pd.version = v;
                fs.writeFileSync(pf, JSON.stringify(pd, null, 2) + '\n');
              }
            }
            // Update marketplace.json
            const mf = '.claude-plugin/marketplace.json';
            if (fs.existsSync(mf)) {
              const md = JSON.parse(fs.readFileSync(mf, 'utf-8'));
              if (md.metadata) md.metadata.version = v;
              if (md.plugins) md.plugins.forEach(p => p.version = v);
              fs.writeFileSync(mf, JSON.stringify(md, null, 2) + '\n');
            }
            // Update openclaw version files if they exist
            for (const ocf of ['openclaw/openclaw.plugin.json', 'openclaw/package.json']) {
              if (fs.existsSync(ocf)) {
                const od = JSON.parse(fs.readFileSync(ocf, 'utf-8'));
                od.version = v;
                fs.writeFileSync(ocf, JSON.stringify(od, null, 2) + '\n');
              }
            }
            // Update codex package.json if exists
            const cpf = 'codex/package.json';
            if (fs.existsSync(cpf)) {
              const cd = JSON.parse(fs.readFileSync(cpf, 'utf-8'));
              cd.version = v;
              fs.writeFileSync(cpf, JSON.stringify(cd, null, 2) + '\n');
            }
          "
          # Rebuild bundles so any version-baked-in literal (e.g. the
          # X-Deeplake-Client header from src/utils/client-header.ts that
          # esbuild inlines via 'define') picks up $VERSION instead of the
          # previous release's value. Without this step, every release
          # shipped bundles carrying the OLD version, and CI's
          # 'Verify bundle/' check failed on every subsequent PR until
          # someone manually rebuilt + committed bundles
          # (see prior chore commits 6f1d89a, 8f911ba).
          npm install
          npm run build
          git add -A
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get merged PR description
        if: steps.check.outputs.exists == 'false'
        id: pr
        run: |
          # Find the most recent merged PR targeting main
          PR_BODY=$(gh pr list --state merged --base main --limit 1 --json body,title -q '.[0].body // ""')
          PR_TITLE=$(gh pr list --state merged --base main --limit 1 --json title -q '.[0].title // ""')
          {
            echo "body<<ENDOFBODY"
            echo "$PR_BODY"
            echo "ENDOFBODY"
            echo "title=$PR_TITLE"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "${{ steps.version.outputs.version }} — ${{ steps.pr.outputs.title }}"
          body: ${{ steps.pr.outputs.body }}
          generate_release_notes: false

  publish:
    # Publish @deeplake/hivemind to npm and the openclaw bundle to ClawHub.
    # Runs only on the bump-commit retrigger (so we publish exactly the
    # version that was just released to GitHub) and pauses at the
    # `production` environment gate for human approval before tokens are
    # accessible. Tokens live as environment-scoped secrets, so PRs from
    # forks and unprotected branches cannot reach them.
    name: Publish to npm + ClawHub
    needs: release
    if: "${{ startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: hivemind-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the latest main HEAD: the push event's SHA may point at
          # the pre-bump commit, but the `release` job above just pushed
          # the bump commit — that's the version we want to publish.
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12'
          registry-url: 'https://registry.npmjs.org'
          scope: '@deeplake'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gate (typecheck + duplication + test)
        # Belt-and-braces: ci.yml already gates merges to main, but a
        # publish job that doesn't re-run the gate could ship if someone
        # disables a CI status check.
        run: npm run ci

      - name: Build bundles
        run: npm run build

      - name: Pack-check (refuse forbidden filenames in tarball)
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          node -e "
            const entries = JSON.parse(require('fs').readFileSync('/tmp/pack.json','utf8'))[0].files.map(f => f.path);
            const forbidden = entries.filter(p =>
              /(^|\/)\.npmrc$/.test(p) ||
              /(^|\/)\.env(\$|\.)/.test(p) ||
              /(^|\/)secrets?(\/|\$)/.test(p) ||
              /(^|\/)\.github(\/|\$)/.test(p) ||
              /(^|\/)\.git(\/|\$)/.test(p)
            );
            if (forbidden.length) {
              console.error('Refusing to publish — forbidden filenames in tarball:');
              for (const f of forbidden) console.error('  ' + f);
              process.exit(1);
            }
            console.log('Pack-check OK — ' + entries.length + ' files, no forbidden patterns');
          "

      - name: Publish to npm with Sigstore provenance
        # --provenance uses the GitHub OIDC token (id-token: write above)
        # to sign the artifact via Sigstore. Even if NPM_TOKEN later leaks,
        # consumers can verify the package was built by THIS workflow on
        # THIS commit, and npmjs.com displays a Provenance badge.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate ClawHub CLI
        # `clawhub login --token` writes a credential file inside the
        # runner's $HOME, which is ephemeral and discarded when the job
        # ends. The token only ever appears as ${{ secrets.* }}, which
        # GitHub auto-masks in logs.
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish openclaw bundle to ClawHub
        # The release job above already synced openclaw/package.json and
        # openclaw/openclaw.plugin.json versions to the bumped root
        # version, so this publishes the same X.Y.Z that npm just got.
        run: clawhub package publish ./openclaw

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          {
            echo "### Published"
            echo ""
            echo "- **npm**: \`@deeplake/hivemind@${VERSION}\` (with Sigstore provenance)"
            echo "- **ClawHub**: \`clawhub:hivemind@${VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
